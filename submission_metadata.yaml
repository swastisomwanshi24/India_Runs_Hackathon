# ============================================================================
ai_tools_used:
  - "ChatGPT"
  - "Gemini"  
  - "Antigravity"

ai_usage_summary: |
  Used ChatGPT and Gemini for debugging and code optimization.
  Used Antigravity for implementing advanced honeypot detection logic, prestige tiering, 
  and multi-factor heuristic ranking. No candidate data was fed to any LLM.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our methodology implements a hybrid scoring system that combines TF-IDF semantic vectorization with multi-factor heuristic multipliers. We specifically address the "Honeypot" requirement by implementing ghost-worker detection, career-timeline validation, and junior-expert penalties. Additionally, we use Education Prestige (Tiering), GitHub Activity Signals, and Startup-specific experience boosts to ensure we find "Shipper" engineers who match the founding team's DNA. Runtime is optimized for CPU-only environments, processing 100k candidates in under 2 minutes.

