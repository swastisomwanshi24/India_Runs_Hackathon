# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Unlike keyword-based systems that fall for "Honeypot" traps, our approach treats candidate profiles as multi-dimensional data structures. We prioritize proven engineering capability (via TF-IDF semantic vectorization) and real-world availability (via behavioral signal analysis), ensuring we find candidates who are actually ready to build, not just candidates who know how to spam keywords. 
  "Runtime is ~30-60 seconds for 1 lakh candidates on CPU."

